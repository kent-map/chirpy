<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --player-bg:        #f6f8fa;
      --player-border:    #dde1e6;
      --player-text:      #24292f;
      --player-muted:     #6e7781;
      --player-accent:    #0969da;
      --player-track-bg:  #d0d7de;
      --player-radius:    10px;
      --player-height:    44px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --player-bg:      #161b22;
        --player-border:  #30363d;
        --player-text:    #e6edf3;
        --player-muted:   #848d97;
        --player-accent:  #58a6ff;
        --player-track-bg:#30363d;
      }
    }

    /* Chirpy dark-mode: parent page sets data-mode="dark" on <html> */
    html[data-mode="dark"] {
      --player-bg:      #161b22;
      --player-border:  #30363d;
      --player-text:    #e6edf3;
      --player-muted:   #848d97;
      --player-accent:  #58a6ff;
      --player-track-bg:#30363d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: transparent;
      color: var(--player-text);
      padding: 6px 0;
    }

    .player-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--player-bg);
      border: 1px solid var(--player-border);
      border-radius: var(--player-radius);
      padding: 10px 14px 8px;
    }

    .player-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--player-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      height: var(--player-height);
    }

    /* Play/Pause button */
    .btn-play {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--player-accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .15s;
    }
    .btn-play:hover { opacity: .85; }
    .btn-play svg { width: 16px; height: 16px; fill: currentColor; }

    /* Time display */
    .time {
      flex-shrink: 0;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: var(--player-muted);
      min-width: 80px;
      text-align: center;
    }

    /* Seek bar */
    .seek-wrap {
      flex: 1;
      display: flex;
      align-items: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--player-track-bg);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--player-accent);
      cursor: pointer;
      transition: transform .1s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.25); }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: none;
      background: var(--player-accent);
      cursor: pointer;
    }

    /* Volume */
    .vol-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-mute {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--player-muted);
      display: flex;
      align-items: center;
      padding: 0;
    }
    .btn-mute:hover { color: var(--player-text); }
    .btn-mute svg { width: 16px; height: 16px; fill: currentColor; }
    .vol-slider { width: 60px; }

    /* Caption */
    .player-caption {
      font-size: 11px;
      color: var(--player-muted);
      margin-top: 2px;
    }

    /* Error state */
    .player-error {
      color: #cf222e;
      font-size: 12px;
      padding: 6px 0;
    }
  </style>
</head>
<body>

<div class="player-wrap" id="player-wrap">
  <div class="player-title" id="title-el" style="display:none"></div>

  <div class="player-controls">
    <button class="btn-play" id="btn-play" aria-label="Play">
      <!-- Play icon -->
      <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <!-- Pause icon (hidden) -->
      <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>

    <div class="seek-wrap">
      <input type="range" id="seek" min="0" value="0" step="0.1" aria-label="Seek">
    </div>

    <div class="time" id="time-el">0:00 / 0:00</div>

    <div class="vol-wrap">
      <button class="btn-mute" id="btn-mute" aria-label="Mute">
        <svg id="icon-vol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/></svg>
        <svg id="icon-mute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/></svg>
      </button>
      <input type="range" id="vol" class="vol-slider" min="0" max="1" step="0.05" value="1" aria-label="Volume">
    </div>
  </div>

  <div class="player-caption" id="caption-el" style="display:none"></div>
  <div class="player-error" id="error-el" style="display:none">Unable to load audio file.</div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
(function () {
  const params  = new URLSearchParams(location.search);
  const src     = params.get('src');
  const caption = params.get('caption');
  const title   = params.get('title');
  const autoplay= params.get('autoplay') === 'true';
  const loop    = params.get('loop')     === 'true';

  const audio     = document.getElementById('audio');
  const btnPlay   = document.getElementById('btn-play');
  const iconPlay  = document.getElementById('icon-play');
  const iconPause = document.getElementById('icon-pause');
  const seek      = document.getElementById('seek');
  const timeEl    = document.getElementById('time-el');
  const btnMute   = document.getElementById('btn-mute');
  const iconVol   = document.getElementById('icon-vol');
  const iconMute  = document.getElementById('icon-mute');
  const volSlider = document.getElementById('vol');
  const captionEl = document.getElementById('caption-el');
  const titleEl   = document.getElementById('title-el');
  const errorEl   = document.getElementById('error-el');

  if (!src) { errorEl.style.display = 'block'; errorEl.textContent = 'No audio source provided.'; return; }

  // Populate optional UI
  if (title)   { titleEl.textContent   = title;   titleEl.style.display   = 'block'; }
  if (caption) { captionEl.innerHTML   = caption; captionEl.style.display = 'block'; }

  audio.loop = loop;
  const ext = src.split('.').pop().toLowerCase();
  const mimeTypes = {
    'mp3':  'audio/mpeg',
    'm4a':  'audio/mp4',
    'mp4a': 'audio/mp4',
    'ogg':  'audio/ogg',
    'wav':  'audio/wav',
  };
  if (mimeTypes[ext]) {
    const source = document.createElement('source');
    source.src  = src;
    source.type = mimeTypes[ext];
    audio.appendChild(source);
  } else {
    audio.src = src;
  }

  // Sync dark-mode with parent frame
  try {
    const parentMode = window.parent?.document?.documentElement?.dataset?.mode;
    if (parentMode === 'dark') document.documentElement.dataset.mode = 'dark';
  } catch (_) {}

  /* ── Helpers ── */
  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const ss = String(Math.floor(s % 60)).padStart(2, '0');
    return `${m}:${ss}`;
  }

  function updateTime() {
    const cur = audio.currentTime || 0;
    const dur = audio.duration   || 0;
    timeEl.textContent = `${fmt(cur)} / ${fmt(dur)}`;
    seek.max   = isFinite(dur) ? dur : 0;
    seek.value = cur;
    // gradient fill for seek bar
    const pct = dur > 0 ? (cur / dur) * 100 : 0;
    seek.style.background =
      `linear-gradient(to right, var(--player-accent) ${pct}%, var(--player-track-bg) ${pct}%)`;
  }

  function setPlayState(playing) {
    iconPlay.style.display  = playing ? 'none'  : '';
    iconPause.style.display = playing ? ''      : 'none';
    btnPlay.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function setMuteState(muted) {
    iconVol.style.display  = muted ? 'none' : '';
    iconMute.style.display = muted ? ''     : 'none';
    btnMute.setAttribute('aria-label', muted ? 'Unmute' : 'Mute');
  }

  /* ── Events ── */
  audio.addEventListener('loadedmetadata', updateTime);
  audio.addEventListener('timeupdate', updateTime);
  audio.addEventListener('ended', () => setPlayState(false));
  audio.addEventListener('error', (e) => { 
    if (audio.networkState === 3) { errorEl.style.display = 'block'; }
  });

  btnPlay.addEventListener('click', () => {
    if (audio.paused) audio.play().catch(() => {});
    else              audio.pause();
    setPlayState(!audio.paused);
  });

  seek.addEventListener('input', () => {
    audio.currentTime = seek.value;
    updateTime();
  });

  volSlider.addEventListener('input', () => {
    audio.volume = volSlider.value;
    audio.muted  = audio.volume === 0;
    setMuteState(audio.muted);
  });

  btnMute.addEventListener('click', () => {
    audio.muted = !audio.muted;
    if (!audio.muted && audio.volume === 0) { audio.volume = 0.5; volSlider.value = 0.5; }
    setMuteState(audio.muted);
  });

  if (autoplay) audio.play().catch(() => {});

  updateTime();
})();
</script>
</body>
</html>
