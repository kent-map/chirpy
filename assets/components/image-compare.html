<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Compare</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: inherit;
      overflow: hidden;
    }

    figure {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .slider-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      overflow: hidden;
      cursor: col-resize;
      user-select: none;
      -webkit-user-select: none;
      background: #111;
    }

    .img-before,
    .img-after {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .img-before img,
    .img-after img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      draggable: false;
    }

    /* "after" sits on top, clipped to the right of the divider */
    .img-after {
      clip-path: inset(0 0 0 50%);
    }

    /* divider line */
    .divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 3px;
      background: #fff;
      transform: translateX(-50%);
      pointer-events: none;
      box-shadow: 0 0 6px rgba(0,0,0,.5);
    }

    /* drag handle */
    .handle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .handle svg {
      width: 22px;
      height: 22px;
      fill: #444;
    }

    /* labels */
    .label {
      position: absolute;
      bottom: 10px;
      padding: 3px 8px;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: 12px;
      border-radius: 3px;
      pointer-events: none;
      white-space: nowrap;
    }
    .label-before { left: 10px; }
    .label-after  { right: 10px; }

    figcaption {
      padding: 6px 8px;
      font-size: 0.8rem;
      text-align: center;
      color: #555;
      background: #fff;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <figure>
    <div class="slider-wrap" id="wrap">
      <div class="img-before"><img id="img-before" alt="Before"></div>
      <div class="img-after"  id="img-after-clip"><img id="img-after" alt="After"></div>
      <div class="divider"    id="divider">
        <div class="handle">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 5l-5 7 5 7M16 5l5 7-5 7" stroke="#444" stroke-width="2.2"
                  stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
      </div>
      <span class="label label-before" id="lbl-before"></span>
      <span class="label label-after"  id="lbl-after"></span>
    </div>
    <figcaption id="caption"></figcaption>
  </figure>

  <script>
    const params  = new URLSearchParams(location.search);
    const before  = params.get('before')  || '';
    const after   = params.get('after')   || '';
    const caption = params.get('caption') || '';
    const lblB    = params.get('label_before') || 'Before';
    const lblA    = params.get('label_after')  || 'After';

    document.getElementById('img-before').src = before;
    document.getElementById('img-after').src  = after;
    document.getElementById('img-before').alt = lblB;
    document.getElementById('img-after').alt  = lblA;
    document.getElementById('lbl-before').textContent = lblB;
    document.getElementById('lbl-after').textContent  = lblA;

    const cap = document.getElementById('caption');
    if (caption) { cap.textContent = caption; }
    else { cap.style.display = 'none'; }

    // ── Drag logic ──────────────────────────────────────────────
    const wrap     = document.getElementById('wrap');
    const clip     = document.getElementById('img-after-clip');
    const divider  = document.getElementById('divider');

    let dragging = false;

    function setPos(pct) {
      pct = Math.max(2, Math.min(98, pct));
      clip.style.clipPath  = `inset(0 0 0 ${pct}%)`;
      divider.style.left   = pct + '%';
    }

    function pctFromEvent(e) {
      const rect = wrap.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      return ((clientX - rect.left) / rect.width) * 100;
    }

    wrap.addEventListener('mousedown',  e => { dragging = true; setPos(pctFromEvent(e)); });
    wrap.addEventListener('touchstart', e => { dragging = true; setPos(pctFromEvent(e)); }, { passive: true });

    window.addEventListener('mousemove',  e => { if (dragging) setPos(pctFromEvent(e)); });
    window.addEventListener('touchmove',  e => { if (dragging) setPos(pctFromEvent(e)); }, { passive: true });

    window.addEventListener('mouseup',   () => { dragging = false; });
    window.addEventListener('touchend',  () => { dragging = false; });
  </script>
</body>
</html>
